services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=pixeldb
      - MYSQL_USER=pixelshare
      - MYSQL_PASSWORD=pixelshare123
      - MYSQL_ROOT_PASSWORD=root123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/pixeldb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=pixelshare
      - SPRING_DATASOURCE_PASSWORD=pixelshare123
      - SERVER_PORT=8083

  frontend:
    build: ./frontend-demo
    restart: unless-stopped
    ports:
      - "8888:80"
    depends_on:
      - backend

volumes:
  mysql_data:
