services:
  backend:
    build: .
    network_mode: host
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/pixeldb?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rgardelserver75
      - SERVER_PORT=8083

  frontend:
    build: ./frontend-demo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8888:80"
    depends_on:
      - backend
    # Note: frontend nginx.conf needs to point to localhost:8083
