<div class="container py-4">
    <div class="row mb-3 align-items-center bg-white p-3 rounded shadow-sm">
        <div class="col-auto">
            <label class="form-label fw-bold">Color:</label>
            <input type="color" class="form-control form-control-color" [(ngModel)]="selectedColor">
        </div>
        <div class="col-auto">
            <label class="form-label fw-bold">Brush Size:</label>
            <input type="range" class="form-range" min="1" max="20" [(ngModel)]="brushSize">
        </div>
        <div class="col text-end">
            <button class="btn btn-outline-danger btn-sm" (click)="clearLocal()">Clear View</button>
            <button class="btn btn-primary btn-sm ms-2" (click)="loadCanvas()">Refresh Wall</button>
        </div>
    </div>

    <div class="canvas-wrapper shadow rounded bg-white overflow-hidden">
        <canvas #pixelCanvas 
                width="800" 
                height="600"
                (mousedown)="startDrawing($event)"
                (mousemove)="draw($event)"
                (mouseup)="stopDrawing()"
                (mouseleave)="stopDrawing()">
        </canvas>
    </div>
</div>
