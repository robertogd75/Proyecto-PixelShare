spring.application.name=demo
server.port=${SERVER_PORT:8083}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:pixeldb;MODE=MySQL;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# HikariCP - retry MySQL connection for up to 2 minutes on startup
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=120000
